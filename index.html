<!DOCTYPE html>
<html>
<head>
  <style>
    body { font-family: Arial, sans-serif; margin: 30px; }
    form { line-height: 1.8; }
    .row { margin-bottom: 8px; }
    .choice { display: inline-block; margin-right: 10px; }
    label { margin-right: 6px; }
  </style>
</head>
<body>
  <form method="post">
    <div class="row">
      User ID: <input type="text" name="userId" size="30">
    </div>
    <div class="row">
      Password: <input type="password" name="password">
    </div>
    <div class="row">
      Address: <input type="text" name="address" size="30">
    </div>
    <div class="row">
      Gender:
      <label class="choice"><input type="radio" name="gender" value="Male"> Male</label>
      <label class="choice"><input type="radio" name="gender" value="Female"> Female</label>
      <label class="choice"><input type="radio" name="gender" value="Other"> Other</label>
    </div>
    <div class="row">
      Hobbies:
      <label class="choice"><input type="checkbox" name="hobbies" value="Reading"> Reading</label>
      <label class="choice"><input type="checkbox" name="hobbies" value="Travelling"> Travelling</label>
      <label class="choice"><input type="checkbox" name="hobbies" value="Sports"> Sports</label>
    </div>
    <div class="row">
      Submit: <input type="submit" name="submit" value="Submit">
      Reset: <input type="reset" name="reset" value="Reset">
    </div>
  </form>
</body>
</html>
