<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Colorful Biodata Form</title>
  <style>
    :root {
      --bg: #111827;
      --surface: #17233c;
      --surface-alt: #1f2f4f;
      --border: rgba(255, 255, 255, 0.12);
      --text: #f8fafc;
      --muted: #94a3b8;
      --accent: #38bdf8;
      --accent-2: #a855f7;
      --success: #22c55e;
      --danger: #f87171;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
      background: radial-gradient(circle at top, rgba(56, 189, 248, 0.16), transparent 28%),
                  linear-gradient(180deg, #0f172a 0%, #111827 58%, #020617 100%);
      color: var(--text);
      display: grid;
      place-items: center;
      padding: 24px;
    }

    .page {
      width: min(100%, 1000px);
      display: grid;
      gap: 24px;
      grid-template-columns: 1.3fr 0.9fr;
    }

    @media (max-width: 860px) {
      .page {
        grid-template-columns: 1fr;
      }
    }

    .panel {
      background: rgba(15, 23, 42, 0.96);
      border: 1px solid var(--border);
      border-radius: 32px;
      box-shadow: 0 30px 80px rgba(15, 23, 42, 0.45);
      padding: 32px;
      overflow: hidden;
    }

    .panel h1 {
      margin-top: 0;
      margin-bottom: 10px;
      font-size: clamp(2rem, 2.4vw, 2.8rem);
      letter-spacing: -0.04em;
    }

    .panel p {
      margin: 0;
      color: var(--muted);
      line-height: 1.75;
    }

    .form-grid {
      display: grid;
      gap: 18px;
      margin-top: 28px;
    }

    label {
      display: block;
      margin-bottom: 8px;
      font-size: 0.95rem;
      font-weight: 600;
      color: #e2e8f0;
    }

    input,
    textarea {
      width: 100%;
      border: 1px solid rgba(148, 163, 184, 0.22);
      border-radius: 18px;
      padding: 14px 16px;
      background: rgba(15, 23, 42, 0.95);
      color: var(--text);
      font-size: 1rem;
      outline: none;
      transition: border-color 0.2s ease, box-shadow 0.2s ease;
    }

    input:focus,
    textarea:focus {
      border-color: rgba(56, 189, 248, 0.75);
      box-shadow: 0 0 0 4px rgba(56, 189, 248, 0.14);
    }

    .row {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 18px;
    }

    .row.small {
      grid-template-columns: repeat(3, minmax(0, 1fr));
    }

    .choice-group {
      display: grid;
      gap: 12px;
      padding: 18px;
      background: rgba(148, 163, 184, 0.05);
      border: 1px solid rgba(148, 163, 184, 0.14);
      border-radius: 20px;
    }

    .choice-item {
      display: flex;
      align-items: center;
      gap: 12px;
      cursor: pointer;
      user-select: none;
    }

    .choice-item input {
      accent-color: var(--accent);
      width: 18px;
      height: 18px;
    }

    .buttons {
      display: flex;
      flex-wrap: wrap;
      gap: 14px;
      margin-top: 16px;
    }

    button {
      border: none;
      border-radius: 18px;
      padding: 14px 20px;
      font-size: 1rem;
      font-weight: 700;
      cursor: pointer;
      transition: transform 0.18s ease, box-shadow 0.18s ease, opacity 0.18s ease;
      background: linear-gradient(135deg, var(--accent), var(--accent-2));
      color: #04111f;
    }

    button:hover {
      transform: translateY(-2px);
      box-shadow: 0 18px 40px rgba(56, 189, 248, 0.2);
    }

    .secondary {
      background: rgba(255, 255, 255, 0.08);
      color: var(--text);
      border: 1px solid rgba(255, 255, 255, 0.08);
    }

    .preview-card {
      display: grid;
      gap: 16px;
      padding: 30px;
      background: linear-gradient(180deg, rgba(30, 58, 138, 0.16), rgba(15, 23, 42, 0.92));
      border-radius: 32px;
      border: 1px solid rgba(255, 255, 255, 0.08);
    }

    .preview-card h2 {
      margin: 0;
      font-size: 1.35rem;
    }

    .preview-list {
      display: grid;
      gap: 10px;
      margin: 0;
      padding: 0;
      list-style: none;
    }

    .preview-item {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      padding: 14px 18px;
      border-radius: 18px;
      background: rgba(255, 255, 255, 0.04);
      border: 1px solid rgba(255, 255, 255, 0.08);
    }

    .preview-item span:first-child {
      color: var(--muted);
    }

    .badge {
      display: inline-flex;
      padding: 0.45em 0.75em;
      border-radius: 999px;
      background: rgba(56, 189, 248, 0.16);
      color: var(--accent);
      font-size: 0.9rem;
      font-weight: 700;
    }

    .message {
      border-radius: 20px;
      padding: 16px 18px;
      background: rgba(15, 23, 42, 0.9);
      border: 1px solid rgba(56, 189, 248, 0.18);
      color: var(--text);
      margin-top: 12px;
    }

    .message.error {
      border-color: rgba(248, 113, 113, 0.24);
      background: rgba(248, 113, 113, 0.12);
      color: #fee2e2;
    }

    .message.success {
      border-color: rgba(34, 197, 94, 0.24);
      background: rgba(34, 197, 94, 0.12);
      color: #dcfce7;
    }

    .subtitle-2 {
      color: var(--muted);
      font-size: 0.95rem;
      margin-top: 4px;
    }

    .hidden {
      display: none;
    }
  </style>
</head>
<body>
  <div class="page">
    <section class="panel">
      <h1>My Biodata</h1>
      <p>Fill in your details, see a live preview, and submit securely to the Python backend.</p>

      <form id="biodata-form" action="/submit" method="post" class="form-grid">
        <div>
          <label for="user-id">User ID</label>
          <input id="user-id" name="user_id" type="text" placeholder="Enter your user id" required />
        </div>

        <div>
          <label for="password">Password</label>
          <input id="password" name="password" type="password" placeholder="Enter a secure password" required />
        </div>

        <div>
          <label for="address">Address</label>
          <textarea id="address" name="address" rows="5" placeholder="Street, city, state..." required></textarea>
        </div>

        <div class="choice-group">
          <label>Gender</label>
          <label class="choice-item"><input type="radio" name="gender" value="Male" checked /> Male</label>
          <label class="choice-item"><input type="radio" name="gender" value="Female" /> Female</label>
          <label class="choice-item"><input type="radio" name="gender" value="Other" /> Other</label>
        </div>

        <div class="choice-group">
          <label>Hobbies</label>
          <label class="choice-item"><input type="checkbox" name="hobbies" value="Games" /> Games</label>
          <label class="choice-item"><input type="checkbox" name="hobbies" value="Reading" /> Reading</label>
          <label class="choice-item"><input type="checkbox" name="hobbies" value="Sports" /> Sports</label>
          <label class="choice-item"><input type="checkbox" name="hobbies" value="Music" /> Music</label>
          <label class="choice-item"><input type="checkbox" name="hobbies" value="Traveling" /> Traveling</label>
        </div>

        <div class="buttons">
          <button type="submit">Send to Python</button>
          <button type="button" class="secondary" id="reset-btn">Reset</button>
        </div>

        <div id="form-message" class="message hidden"></div>
      </form>
    </section>

    <aside class="panel preview-card">
      <h2>Preview</h2>
      <p class="subtitle-2">Watch the biodata card update as you type.</p>
      <ul class="preview-list">
        <li class="preview-item"><span>User ID</span><strong id="preview-user">-</strong></li>
        <li class="preview-item"><span>Gender</span><strong id="preview-gender">Male</strong></li>
        <li class="preview-item"><span>Hobbies</span><strong id="preview-hobbies">Games</strong></li>
        <li class="preview-item"><span>Address</span><strong id="preview-address">-</strong></li>
      </ul>
      <div id="server-response" class="message hidden"></div>
    </aside>
  </div>

  <script>
    const form = document.getElementById('biodata-form');
    const resetBtn = document.getElementById('reset-btn');
    const message = document.getElementById('form-message');
    const responseBox = document.getElementById('server-response');
    const previewUser = document.getElementById('preview-user');
    const previewGender = document.getElementById('preview-gender');
    const previewHobbies = document.getElementById('preview-hobbies');
    const previewAddress = document.getElementById('preview-address');
    const userIdInput = document.getElementById('user-id');
    const addressInput = document.getElementById('address');

    function showMessage(root, text, variant = 'success') {
      root.textContent = text;
      root.className = `message ${variant}`;
      root.classList.remove('hidden');
    }

    function clearMessage(root) {
      root.classList.add('hidden');
      root.textContent = '';
    }

    function updatePreview() {
      const formData = new FormData(form);
      const hobbies = formData.getAll('hobbies');

      previewUser.textContent = formData.get('user_id') || '-';
      previewGender.textContent = formData.get('gender') || 'Male';
      previewAddress.textContent = formData.get('address') ? formData.get('address').trim() : '-';
      previewHobbies.textContent = hobbies.length ? hobbies.join(', ') : 'None';
    }

    form.addEventListener('input', updatePreview);
    updatePreview();

    resetBtn.addEventListener('click', () => {
      form.reset();
      updatePreview();
      clearMessage(message);
      clearMessage(responseBox);
    });

    form.addEventListener('submit', async (event) => {
      event.preventDefault();
      clearMessage(message);
      clearMessage(responseBox);

      const formData = new FormData(form);
      const data = {
        user_id: formData.get('user_id'),
        password: formData.get('password'),
        address: formData.get('address'),
        gender: formData.get('gender'),
        hobbies: formData.getAll('hobbies'),
      };

      if (!data.user_id || !data.password || !data.address) {
        showMessage(message, 'Please fill all required fields before submitting.', 'error');
        return;
      }

      try {
        const response = await fetch('/submit', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(data),
        });
        const result = await response.json();

        if (response.ok) {
          showMessage(message, result.message, 'success');
          showMessage(responseBox, `Summary: ${result.summary}`);
        } else {
          showMessage(message, result.error || 'Submission failed.', 'error');
        }
      } catch (error) {
        showMessage(message, 'Backend unavailable. Run the Python server first.', 'error');
      }
    });
  </script>
</body>
</html>
